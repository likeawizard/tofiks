version: "2"
linters:
  enable:
    - asciicheck
    - copyloopvar
    - dogsled
    - gocritic
    - godot
    - goprintffuncname
    - misspell
    - nakedret
    - nolintlint
    - revive
    - rowserrcheck
    - unconvert
    - unparam
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    gocognit:
      min-complexity: 15
    govet:
      enable:
        - fieldalignment
    revive:
      confidence: 0.8
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - cmd/playground
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - prefix(github.com/toggl/toggl_work_api)
        - default
      custom-order: true
  exclusions:
    generated: lax
    paths:
      - cmd/playground
      - third_party$
      - builtin$
      - examples$
