name: OpenBench Test
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, labeled]

jobs:
  trigger:
    name: Trigger OpenBench test
    if: >-
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'run-bench')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Skip if spsa.json exists
        run: |
          if [ -f spsa.json ]; then
            echo "::error::spsa.json exists — this is an SPSA branch, not a bench test branch. Remove spsa.json or use the SPSA workflow."
            exit 1
          fi

      - name: Dispatch to tofiks-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_PAT }}
          repository: likeawizard/tofiks-infra
          event-type: openbench-test
          client-payload: '{"pr_branch": "${{ github.head_ref }}", "pr_number": "${{ github.event.pull_request.number }}", "pr_sha": "${{ github.event.pull_request.head.sha }}"}'
