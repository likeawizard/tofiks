name: Deploy Bot
on:
  push:
    branches: [master]

jobs:
  trigger-deploy:
    name: Trigger tofiks-infra deploy
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to tofiks-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_PAT }}
          repository: likeawizard/tofiks-infra
          event-type: deploy
          client-payload: '{"target": "bot"}'
